services:
  api:
    image: ghcr.io/mridul091/chat-backend:latest
    # No build: — we pull the pre-built image from GHCR

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  postgres:
    ports: []   # Don't expose Postgres to the internet

  redis:
    ports: []   # Don't expose Redis to the internet
