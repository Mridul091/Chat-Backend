
# =============================================================================
# Nginx – Chat-Backend Reverse Proxy (Initial / Development Setup)
# =============================================================================
# Sits in front of the FastAPI (Uvicorn) container.
# Handles:
#   • HTTP → FastAPI REST  (/api/v1/*)
#   • WebSocket upgrade    (/ws/*)
#   • Static files         (/static/*)
#   • Rate-limiting, request size cap, timeouts
# =============================================================================

# Worker process count: "auto" = one per CPU core.
worker_processes auto;

events {
    # Max simultaneous connections per worker.
    worker_connections 1024;
}

http {  
    # ── MIME types ──────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Request size cap (protect from large payloads) ───────────────────────
    client_max_body_size 10M;

    # ── Rate limiting zone ───────────────────────────────────────────────────
    # 10 MB shared memory zone; allows ~160 000 unique IPs.
    # Each IP is limited to 10 requests/second.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ── Upstream: FastAPI (Uvicorn) ──────────────────────────────────────────
    # "api" resolves to the Docker Compose service name.
    upstream fastapi {
        server api:8000;
        # keepalive connections to upstream (reduces TCP overhead)
        keepalive 32;
    }

    # ── Server block ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;  # replace with your domain in production

        # ── WebSocket (/ws/*) ────────────────────────────────────────────────
        # Must come BEFORE the generic /api/ block because nginx matches
        # location blocks by specificity (longest prefix first).
        location /ws/ {
            proxy_pass         http://fastapi;

            # Required for WebSocket handshake
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # Forward real client IP
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep WebSocket connections alive longer
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── REST API (/api/*) ────────────────────────────────────────────────
        location /api/ {
            # Apply rate limiting; burst allows short spikes without dropping.
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://fastapi;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Standard timeouts for REST calls
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ── Static files (/static/*) ─────────────────────────────────────────
        # Served by FastAPI's StaticFiles mount; Nginx just proxies through.
        # location /static/ {
        #     proxy_pass       http://fastapi;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;

        #     # Cache static assets in the browser for 1 day
        #     expires 1d;
        #     add_header Cache-Control "public, max-age=86400";
        # }

        # ── Health check (optional, bypasses rate limit) ─────────────────────
        location /api/v1/health {
            proxy_pass       http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;    # don't pollute logs with health-check noise
        }

        # ── Catch-all: 404 for anything not routed above ──────────────────────
        location / {
            return 404;
        }
    }
}
